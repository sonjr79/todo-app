<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; min-height: 100vh; }
    #app { background: white; border-radius: 8px; padding: 24px; width: 100%; max-width: 480px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h1 { font-size: 1.5rem; margin-bottom: 16px; }
    #input-area { display: flex; gap: 8px; margin-bottom: 16px; }
    #todo-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    #add-btn { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    #add-btn:hover { background: #4338ca; }
    #todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .todo-item .text { flex: 1; font-size: 1rem; }
    .todo-item.done .text { text-decoration: line-through; color: #aaa; }
    .todo-item .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; }
    .todo-item .del-btn:hover { color: #e53e3e; }
  </style>
</head>
<body>
  <div id="app">
    <h1>Todo</h1>
    <div id="input-area">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요" />
      <button id="add-btn">추가</button>
    </div>
    <ul id="todo-list"></ul>
  </div>
  <script>
    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list = document.getElementById('todo-list');

    let todos = JSON.parse(localStorage.getItem('todos') || '[]');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      list.innerHTML = '';
      todos.forEach((todo, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = todo.done;
        cb.addEventListener('change', () => {
          todos[i].done = cb.checked;
          save();
          render();
        });

        const span = document.createElement('span');
        span.className = 'text';
        span.textContent = todo.text;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '✕';
        del.addEventListener('click', () => {
          todos.splice(i, 1);
          save();
          render();
        });

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) addTodo(); });

    render();
  </script>
</body>
</html>
